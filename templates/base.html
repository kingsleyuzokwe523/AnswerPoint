<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnswerPoint - WAEC & NECO Answers Portal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #4F46E5 0%, #0D9488 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .pin-input:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
        }
        .answer-card {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .subject-card:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }
        .ticker {
            animation: ticker 20s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="gradient-bg shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-graduation-cap text-white text-2xl"></i>
                    <span class="text-white font-bold text-xl">AnswerPoint</span>
                    <span class="text-yellow-300 text-sm">WAEC/NECO 2026</span>
                </div>
                <div class="hidden md:flex space-x-6">
                    <a href="/" class="text-white hover:text-yellow-300 transition">Home</a>
                    <a href="/#subjects" class="text-white hover:text-yellow-300 transition">Subjects</a>
                    <a href="/#timetable" class="text-white hover:text-yellow-300 transition">Timetable</a>
                    <a href="/admin/login" class="text-white hover:text-yellow-300 transition">
                        <i class="fas fa-lock"></i> Admin
                    </a>
                </div>
                <button id="mobile-menu-btn" class="md:hidden text-white">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden gradient-bg pb-4">
            <div class="flex flex-col space-y-3 px-4">
                <a href="/" class="text-white hover:text-yellow-300 transition">Home</a>
                <a href="/#subjects" class="text-white hover:text-yellow-300 transition">Subjects</a>
                <a href="/#timetable" class="text-white hover:text-yellow-300 transition">Timetable</a>
                <a href="/admin/login" class="text-white hover:text-yellow-300 transition">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-btn')?.addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
